<!DOCTYPE html>
<html lang="en" data-theme="{{ user_theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Product | CORE STORE</title>
    
    <script>
        (function() {
            const themeData = document.documentElement.getAttribute('data-theme');
            if (themeData === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #0f172a; 
            --accent: #2563eb; 
            --bg-main: #f8fafc;
        }

        html.dark {
            --primary: #ffffff;
            --accent: #3b82f6;
            --bg-main: #0f172a; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--primary); 
            overflow-x: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .glass { 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 4px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        html.dark .glass {
            background-color: #1e293b;
            border-color: #334155; 
        }

        .reason-option {
            transition: all 0.2s ease;
        }
        .reason-option:hover {
            background-color: #f8fafc;
        }
        html.dark .reason-option:hover {
            background-color: #0f172a; 
        }
        
        .reason-option.selected {
            background-color: #fffbeb; /* Amber 50 */
            border-color: #f59e0b; /* Amber 500 */
        }
        html.dark .reason-option.selected {
            background-color: rgba(245, 158, 11, 0.15); 
            border-color: #fbbf24; /* Amber 400 */
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    {% include 'core-templates/navbar.html' %}

    <div class="bg-gradient-to-r from-[#0f172a] via-[#1e293b] to-[#0f172a] border-b border-blue-400/20 py-10 sm:py-12 md:py-16 shadow-lg px-4">
      <div class="container mx-auto max-w-3xl">
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-black tracking-tighter text-white uppercase italic leading-tight">
          Return <span class="text-amber-500">Product</span>
        </h1>
        <div class="flex items-center gap-4 mt-3 sm:mt-4">
            <p class="text-[9px] sm:text-[10px] text-amber-200/60 font-bold uppercase tracking-[0.2em] sm:tracking-[0.3em] shrink-0">
                Order #{{ order.order_number }}
            </p>
            <div class="h-[1px] flex-1 bg-amber-500/20"></div>
        </div>
      </div>
    </div>

    <main class="container mx-auto px-4 sm:px-6 md:px-8 mt-8 md:mt-12 max-w-3xl">
        
        <div class="glass p-6 sm:p-8 md:p-12 animate__animated animate__fadeIn">
            <div class="text-center mb-8">
                <i class="fa-solid fa-arrow-rotate-left text-4xl text-amber-500 mb-4 transition-colors"></i>
                <h2 class="text-xl sm:text-2xl font-black uppercase tracking-tighter text-slate-900 dark:text-white mb-2 transition-colors">
                    Initiate Return Request
                </h2>
                <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed transition-colors">
                    Returning: <strong>{{ product.name }}</strong><br>
                    Please select the appropriate reason for returning this unit.
                </p>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 uppercase tracking-widest mb-4 transition-colors">
                        Reason for Return
                    </label>
                    
                    <div class="space-y-2">
                        <label class="reason-option flex items-center p-4 border border-slate-200 dark:border-slate-700 rounded-sm cursor-pointer">
                            <input type="radio" name="reason" value="Defective/Damaged" class="mr-3 text-amber-500 focus:ring-amber-500 dark:bg-slate-900 dark:border-slate-600" required>
                            <span class="text-sm font-medium text-slate-900 dark:text-slate-200 transition-colors">Defective or Damaged</span>
                        </label>
                        
                        <label class="reason-option flex items-center p-4 border border-slate-200 dark:border-slate-700 rounded-sm cursor-pointer">
                            <input type="radio" name="reason" value="Wrong item received" class="mr-3 text-amber-500 focus:ring-amber-500 dark:bg-slate-900 dark:border-slate-600">
                            <span class="text-sm font-medium text-slate-900 dark:text-slate-200 transition-colors">Wrong item received</span>
                        </label>
                        
                        <label class="reason-option flex items-center p-4 border border-slate-200 dark:border-slate-700 rounded-sm cursor-pointer">
                            <input type="radio" name="reason" value="Size/Fit issue" class="mr-3 text-amber-500 focus:ring-amber-500 dark:bg-slate-900 dark:border-slate-600">
                            <span class="text-sm font-medium text-slate-900 dark:text-slate-200 transition-colors">Size or Fit issue</span>
                        </label>
                        
                        <label class="reason-option flex items-center p-4 border border-slate-200 dark:border-slate-700 rounded-sm cursor-pointer">
                            <input type="radio" name="reason" value="Quality issue" class="mr-3 text-amber-500 focus:ring-amber-500 dark:bg-slate-900 dark:border-slate-600">
                            <span class="text-sm font-medium text-slate-900 dark:text-slate-200 transition-colors">Quality issue</span>
                        </label>
                        
                        <label class="reason-option flex items-center p-4 border border-slate-200 dark:border-slate-700 rounded-sm cursor-pointer">
                            <input type="radio" name="reason" value="other" id="other-radio" class="mr-3 text-amber-500 focus:ring-amber-500 dark:bg-slate-900 dark:border-slate-600">
                            <span class="text-sm font-medium text-slate-900 dark:text-slate-200 transition-colors">Other</span>
                        </label>
                    </div>
                    
                    <div id="custom-reason" class="hidden mt-4">
                        <textarea name="custom_reason" rows="3" 
                            class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white rounded-sm focus:ring-2 focus:ring-amber-500 focus:border-amber-500 dark:placeholder-slate-500 transition-colors resize-none shadow-inner"
                            placeholder="Please specify your reason for return..."></textarea>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 pt-6 border-t border-slate-100 dark:border-slate-700 transition-colors">
                    <a href="{% url 'order_detail' order.id %}" 
                        class="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-transparent dark:border-slate-700 px-6 py-3.5 rounded-sm font-black text-sm uppercase tracking-widest hover:bg-slate-200 dark:hover:bg-slate-700 transition-all text-center">
                        Back to Order
                    </a>
                    <button type="submit" 
                        class="flex-1 bg-amber-500 text-white px-6 py-3.5 rounded-sm font-black text-sm uppercase tracking-widest hover:bg-amber-600 transition-all shadow-md hover:shadow-lg">
                        Submit Return
                    </button>
                </div>
            </form>
        </div>
    </main>

    {% include 'core-templates/footer.html' %}

    <script>
        document.querySelectorAll('input[name="reason"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.reason-option').forEach(option => {
                    option.classList.remove('selected');
                });
                this.closest('.reason-option').classList.add('selected');
                
                const customReason = document.getElementById('custom-reason');
                if (this.value === 'other') {
                    customReason.classList.remove('hidden');
                    customReason.querySelector('textarea').required = true;
                } else {
                    customReason.classList.add('hidden');
                    customReason.querySelector('textarea').required = false;
                }
            });
        });

        function applyTheme() {
            const themeData = document.documentElement.getAttribute('data-theme');
            if (themeData === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        document.addEventListener('DOMContentLoaded', applyTheme);
    </script>
</body>
</html>
