<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Order | CORE STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #0f172a; 
            --accent: #2563eb; 
            --bg-main: #f8fafc;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--primary); 
            overflow-x: hidden; 
        }
        
        .glass { 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 4px;
        }

        .reason-option {
            transition: all 0.2s ease;
        }
        .reason-option:hover {
            background-color: #f8fafc;
        }
        .reason-option.selected {
            background-color: #eff6ff;
            border-color: #2563eb;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    {% include 'core-templates/navbar.html' %}

    <div class="bg-gradient-to-r from-[#0f172a] via-[#1e293b] to-[#0f172a] border-b border-blue-400/20 py-10 sm:py-12 md:py-16 shadow-lg px-4">
      <div class="container mx-auto max-w-3xl">
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-black tracking-tighter text-white uppercase italic leading-tight">
          Cancel <span class="text-red-400">Order</span>
        </h1>
        <div class="flex items-center gap-4 mt-3 sm:mt-4">
            <p class="text-[9px] sm:text-[10px] text-red-200/60 font-bold uppercase tracking-[0.2em] sm:tracking-[0.3em] shrink-0">
                Order #{{ order.order_number }}
            </p>
            <div class="h-[1px] flex-1 bg-red-400/10"></div>
        </div>
      </div>
    </div>

    <main class="container mx-auto px-4 sm:px-6 md:px-8 mt-8 md:mt-12 max-w-3xl">
        
        <div class="glass p-6 sm:p-8 md:p-12 animate__animated animate__fadeIn">
            <div class="text-center mb-8">
                <i class="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-4"></i>
                <h2 class="text-xl sm:text-2xl font-black uppercase tracking-tighter text-slate-900 mb-2">
                    Confirm Cancellation
                </h2>
                <p class="text-slate-600 text-sm leading-relaxed">
                    Please provide a reason for cancelling this order. This action cannot be undone.
                </p>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-slate-700 uppercase tracking-widest mb-4">
                        Reason for Cancellation
                    </label>
                    
                    <div class="space-y-2">
                        <label class="reason-option flex items-center p-4 border border-slate-200 rounded-sm cursor-pointer">
                            <input type="radio" name="reason" value="Changed my mind" class="mr-3 text-blue-600 focus:ring-blue-500" required>
                            <span class="text-sm font-medium text-slate-900">Changed my mind</span>
                        </label>
                        
                        <label class="reason-option flex items-center p-4 border border-slate-200 rounded-sm cursor-pointer">
                            <input type="radio" name="reason" value="Found better price elsewhere" class="mr-3 text-blue-600 focus:ring-blue-500">
                            <span class="text-sm font-medium text-slate-900">Found better price elsewhere</span>
                        </label>
                        
                        <label class="reason-option flex items-center p-4 border border-slate-200 rounded-sm cursor-pointer">
                            <input type="radio" name="reason" value="Delivery delay" class="mr-3 text-blue-600 focus:ring-blue-500">
                            <span class="text-sm font-medium text-slate-900">Delivery delay</span>
                        </label>
                        
                        <label class="reason-option flex items-center p-4 border border-slate-200 rounded-sm cursor-pointer">
                            <input type="radio" name="reason" value="Ordered by mistake" class="mr-3 text-blue-600 focus:ring-blue-500">
                            <span class="text-sm font-medium text-slate-900">Ordered by mistake</span>
                        </label>
                        
                        <label class="reason-option flex items-center p-4 border border-slate-200 rounded-sm cursor-pointer">
                            <input type="radio" name="reason" value="other" id="other-radio" class="mr-3 text-blue-600 focus:ring-blue-500">
                            <span class="text-sm font-medium text-slate-900">Other</span>
                        </label>
                    </div>
                    
                    <div id="custom-reason" class="hidden mt-4">
                        <textarea name="custom_reason" rows="3" 
                            class="w-full px-4 py-3 border border-slate-200 rounded-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none"
                            placeholder="Please specify your reason..."></textarea>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 pt-6 border-t border-slate-100">
                    <a href="{% url 'orders' %}" 
                        class="flex-1 bg-slate-100 text-slate-700 px-6 py-3 rounded-sm font-black text-sm uppercase tracking-widest hover:bg-slate-200 transition-all text-center">
                        Keep Order
                    </a>
                    <button type="submit" 
                        class="flex-1 bg-red-600 text-white px-6 py-3 rounded-sm font-black text-sm uppercase tracking-widest hover:bg-red-700 transition-all shadow-lg hover:shadow-xl">
                        Cancel Order
                    </button>
                </div>
            </form>
        </div>

    </main>

    {% include 'core-templates/footer.html' %}

    <script>
        // Handle radio button selection styling
        document.querySelectorAll('input[name="reason"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.reason-option').forEach(option => {
                    option.classList.remove('selected');
                });
                this.closest('.reason-option').classList.add('selected');
                
                // Show/hide custom reason textarea
                const customReason = document.getElementById('custom-reason');
                if (this.value === 'other') {
                    customReason.classList.remove('hidden');
                    customReason.querySelector('textarea').required = true;
                } else {
                    customReason.classList.add('hidden');
                    customReason.querySelector('textarea').required = false;
                }
            });
        });
    </script>
</body>
</html>
