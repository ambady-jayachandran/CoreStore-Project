<nav class="fixed top-0 left-0 right-0 z-[100] bg-[#0f172a] border-b border-blue-400/10 shadow-2xl backdrop-blur-md bg-opacity-95">
  <div class="container mx-auto px-4 lg:px-8 py-3 md:py-4">
    <div class="flex items-center justify-between gap-4">
      
      <a href="/" class="flex-shrink-0 text-xl md:text-2xl font-black tracking-tighter text-white group flex items-center">
        <span class="bg-blue-600 text-white px-2 py-1 rounded-md mr-2 group-hover:bg-blue-500 transition-colors shadow-lg shadow-blue-900/40">C</span>
        CORE<span class="text-blue-400">STORE</span>
      </a>

      <form method="GET" action="{% url 'search' %}" class="hidden lg:flex flex-1 max-w-md relative group">
        <input type="text" name="q" placeholder="Search premium gear..." 
               class="w-full pl-11 pr-4 py-2 bg-white/5 border border-white/10 rounded-xl text-white placeholder-blue-200/30 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:bg-white/10 transition-all duration-300 text-sm font-medium" />
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-blue-400/50 group-focus-within:text-blue-400 transition-colors"></i>
      </form>

      <div class="flex items-center gap-3 md:gap-6">
        
        <div class="hidden lg:flex items-center gap-8 mr-4">
          <a href="/products/" class="text-xs font-bold uppercase tracking-[0.2em] {% if '/products/' in request.path %}text-blue-400{% else %}text-blue-100/60 hover:text-white{% endif %} transition-colors">Products</a>
          <a href="{% url 'cart' %}" class="relative text-xs font-bold uppercase tracking-[0.2em] {% if request.resolver_match.url_name == 'cart' %}text-blue-400{% else %}text-blue-100/60 hover:text-white{% endif %} transition-colors">
            Cart
            <span class="absolute -top-2 -right-3 bg-blue-600 text-white text-[8px] px-1.5 rounded-full">2</span>
          </a>
        </div>

        {% if user.is_authenticated %}
        <div class="relative group">
          <button class="flex items-center gap-3 focus:outline-none">
            <div class="text-right hidden sm:block">
              <p class="text-[8px] text-blue-400 font-black uppercase tracking-widest">Operator</p>
              <p class="text-xs font-bold text-white">{{ user.username }}</p>
            </div>
            <div class="w-10 h-10 rounded-full border-2 border-blue-500/30 p-0.5 group-hover:border-blue-500 transition-all overflow-hidden bg-slate-800">
              {% if user.profile_image %}
                <img src="{{ user.profile_image.url }}" class="w-full h-full rounded-full object-cover">
              {% else %}
                <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=2563eb&color=fff&bold=true" class="w-full h-full rounded-full">
              {% endif %}
            </div>
          </button>
          
          <div class="absolute top-full right-0 mt-3 w-56 bg-[#1e293b] rounded-xl p-2 shadow-2xl border border-white/5 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 translate-y-2 group-hover:translate-y-0 z-50">
            <div class="p-3 border-b border-white/5 mb-1">
              <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Registry Controls</p>
            </div>
            <a href="{% url 'profile' %}" class="flex items-center gap-3 p-2.5 rounded-lg hover:bg-blue-600 text-blue-100 hover:text-white transition-all text-xs font-bold uppercase">
              <i class="fa-solid fa-circle-user w-4 text-blue-400"></i> Profile
            </a>
            <a href="/orders" class="flex items-center gap-3 p-2.5 rounded-lg hover:bg-blue-600 text-blue-100 hover:text-white transition-all text-xs font-bold uppercase">
              <i class="fa-solid fa-box w-4 text-orange-400"></i> Orders
            </a>
            <div class="h-px bg-white/5 my-1"></div>
            <a href="{% url 'logout' %}" class="flex items-center gap-3 p-2.5 rounded-lg text-red-400 hover:bg-red-500 hover:text-white transition-all text-xs font-bold uppercase">
              <i class="fa-solid fa-power-off w-4"></i> Sign Out
            </a>
          </div>
        </div>
        {% else %}
        <div class="flex items-center gap-2">
          <a href="{% url 'login' %}" class="hidden sm:block px-4 py-2 text-blue-100 hover:text-white text-[10px] font-black uppercase tracking-widest">Sign In</a>
          <a href="{% url 'register' %}" class="px-5 py-2.5 bg-blue-600 text-white text-[10px] font-black uppercase tracking-widest rounded-lg hover:bg-blue-500 shadow-lg shadow-blue-900/30 active:scale-95 transition-all">Join</a>
        </div>
        {% endif %}

        <button onclick="toggleMobileMenu()" class="lg:hidden p-2 text-blue-100 hover:text-white">
          <i class="fa-solid fa-bars-staggered text-xl"></i>
        </button>
      </div>
    </div>

    <div class="lg:hidden mt-4 pb-2">
      <form method="GET" action="{% url 'search' %}" class="relative">
        <input type="text" name="q" placeholder="Search products..." 
               class="w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500/50">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-blue-400/40"></i>
      </form>
    </div>
  </div>

  <div id="mobileSidebar" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[200] hidden lg:hidden">
    <div class="absolute top-0 right-0 w-[280px] h-full bg-[#0f172a] shadow-2xl p-6 transform transition-transform duration-300 translate-x-full" id="sidebarContent">
      <div class="flex justify-between items-center mb-10">
        <span class="text-blue-400 font-black uppercase tracking-widest text-xs">Registry Menu</span>
        <button onclick="toggleMobileMenu()" class="text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      
      <nav class="space-y-6">
        <a href="/products/" class="flex items-center gap-4 text-white font-black uppercase tracking-[0.2em] text-sm">
          <i class="fa-solid fa-layer-group text-blue-500"></i> Products
        </a>
        <a href="{% url 'cart' %}" class="flex items-center gap-4 text-white font-black uppercase tracking-[0.2em] text-sm">
          <i class="fa-solid fa-cart-shopping text-emerald-500"></i> Cart
        </a>
        <a href="/wishlist" class="flex items-center gap-4 text-white font-black uppercase tracking-[0.2em] text-sm">
          <i class="fa-solid fa-heart text-pink-500"></i> Wishlist
        </a>
        <div class="h-px bg-white/5 my-6"></div>
        <a href="{% url 'support_or_contact' %}" class="flex items-center gap-4 text-white font-black uppercase tracking-[0.2em] text-sm">
          <i class="fa-solid fa-headset text-blue-400"></i> Support
        </a>
      </nav>
    </div>
  </div>
</nav>

<div class="h-[120px] lg:h-[80px]"></div>

<script>
  function toggleMobileMenu() {
    const sidebar = document.getElementById('mobileSidebar');
    const content = document.getElementById('sidebarContent');
    if (sidebar.classList.contains('hidden')) {
      sidebar.classList.remove('hidden');
      setTimeout(() => content.classList.remove('translate-x-full'), 10);
    } else {
      content.classList.add('translate-x-full');
      setTimeout(() => sidebar.classList.add('hidden'), 300);
    }
  }
</script>
